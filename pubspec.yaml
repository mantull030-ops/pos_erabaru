name: pos_app
description: A new Flutter Point of Sale project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend & State Management
  supabase_flutter: ^2.5.0
  provider: ^6.1.2
  
  # UI & Fonts
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  
  # Icons & Style
  cupertino_icons: ^1.0.6
  
  # Barcode & Scanner
  mobile_scanner: ^5.1.1
  barcode_widget: ^2.0.4
  
  # File, Picker & Utils
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  path_provider: ^2.1.3
  intl: ^0.19.0
  uuid: ^4.4.0
  
  # PDF & Print
  pdf: ^3.11.0
  printing: ^5.13.1
  
  # Excel Export
  excel: ^4.0.3
  
  # Share
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
